trigger:
  branches:
    include:
      - main

variables:
  acrName: 'EventContainerTest'
  imageName: 'nacimeventscape'
  imageTag: '7'
  resourceGroup: 'EventBooking'
  appServiceName: 'EventScape'
  # Use absolute paths for reliability
  dockerfilePath: '$(Build.SourcesDirectory)/EventScape-main/Dockerfile'  # Double-check spelling of "EventScape" vs "EventScape"
  buildContext: '$(Build.SourcesDirectory)/EventScape'
  azureServiceConnection: 'eventbooking'
  acrServiceConnection: 'eventbookingdockerregistry'

stages:

- stage: BuildAndPush
  displayName: 'Build and Push Docker Image'
  jobs:
    - job: Build
      displayName: 'Build and Push'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        # ===== DEBUGGING: Verify repository structure =====
        - script: |
            echo "Build.SourcesDirectory: $(Build.SourcesDirectory)"
            ls -R $(Build.SourcesDirectory)
            echo "Checking for Dockerfile at $(dockerfilePath)"
            test -f $(dockerfilePath) && echo "✅ Dockerfile FOUND" || echo "❌ Dockerfile MISSING"
          displayName: 'Debug: Check Dockerfile Exists'

        # ===== BUILD AND PUSH =====
        - task: Docker@2
          displayName: 'Build and Push to ACR'
          inputs:
            containerRegistry: $(acrServiceConnection)
            repository: $(imageName)
            command: buildAndPush
            Dockerfile: $(dockerfilePath)  # Now using absolute path
            buildContext: $(buildContext)
            tags: $(imageTag)

- stage: Deploy
  displayName: 'Deploy to Azure Web App'
  dependsOn: BuildAndPush
  jobs:
    - job: DeployJob
      displayName: 'Deploy Container'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - task: AzureWebAppContainer@1
          displayName: 'Update Web App Container'
          inputs:
            azureSubscription: $(azureServiceConnection)
            appName: $(appServiceName)
            containers: $(acrName).azurecr.io/$(imageName):$(imageTag)
            appSettings: |
              -DOCKER_ENABLE_CI true