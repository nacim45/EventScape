trigger:
  branches:
    include:
      - main

variables:
  acrName: 'EventContainerTest'
  imageName: 'nacimeventscape'
  imageTag: '7'  # Fixed tag (update manually or parameterize)
  resourceGroup: 'EventBooking'
  appServiceName: 'EventScape'
  dockerfilePath: '**/Dockerfile'  # Updated to search recursively
  buildContext: '$(Build.SourcesDirectory)/EventScape'  # Full path
  azureServiceConnection: 'eventbooking'
  acrServiceConnection: 'eventbookingdockerregistry'

stages:

- stage: BuildAndPush
  displayName: 'Build and Push Docker Image'
  jobs:
    - job: Build
      displayName: 'Build and Push'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        # Verify Dockerfile exists (debugging)
        - script: |
            ls -R $(Build.SourcesDirectory)
            test -f $(Build.SourcesDirectory)/EventScape/Dockerfile && echo "Dockerfile found" || echo "Dockerfile missing"
          displayName: 'Verify Dockerfile Location'

        # Build and push
        - task: Docker@2
          displayName: 'Build and Push to ACR'
          inputs:
            containerRegistry: $(acrServiceConnection)
            repository: $(imageName)
            command: buildAndPush
            Dockerfile: $(Build.SourcesDirectory)/EventScape/Dockerfile  # Absolute path
            buildContext: $(Build.SourcesDirectory)/EventScape
            tags: $(imageTag)

- stage: Deploy
  displayName: 'Deploy to Azure Web App'
  dependsOn: BuildAndPush
  condition: succeeded('BuildAndPush')  # Explicit condition
  jobs:
    - job: DeployJob
      displayName: 'Deploy Container'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - task: AzureWebAppContainer@1  # Updated to container-specific task
          displayName: 'Update Web App Container'
          inputs:
            azureSubscription: $(azureServiceConnection)
            appName: $(appServiceName)
            containers: $(acrName).azurecr.io/$(imageName):$(imageTag)
            appSettings: |
              -DOCKER_ENABLE_CI true  # Force image pull