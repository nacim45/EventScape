# deploy-webapp.yml
trigger: none

resources:
  pipelines:
  - pipeline: build_pipeline
    source: "nacim45.EventScape (10)"
    trigger: true

variables:
  acrName: 'eventbookingcontainer'  # Changed to lowercase
  imageName: 'nacimeventscape'
  resourceGroup: 'EventBooking'
  appServiceName: 'EventScapeApp'  # Verify this matches exactly in Azure Portal
  azureServiceConnection: 'eventbooking'
  acrServiceConnection: 'EventBookingContainer'

stages:
- stage: Deploy
  displayName: Deploy to Web App
  jobs:
  - job: Deploy
    displayName: Update Web App Container
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Verify Web App exists first
    - task: AzureCLI@2
      displayName: Verify Web App Exists
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az webapp show --name $(appServiceName) --resource-group $(resourceGroup)

    # Get latest tag
    - bash: |
        latestTag=$(az acr repository show-tags \
          --name $(acrName) \
          --repository $(imageName) \
          --orderby time_desc \
          --query '[0]' \
          --output tsv)
        echo "##vso[task.setvariable variable=imageTag]$latestTag"
        echo "Using tag: $latestTag"
      displayName: Get Latest ACR Image Tag

    # Deploy with proper appSettings format
    - task: AzureWebAppContainer@1
      displayName: Update Web App Container
      inputs:
        azureSubscription: $(azureServiceConnection)
        appName: $(appServiceName)
        containers: $(acrName).azurecr.io/$(imageName):$(imageTag)
        appSettings: '[{"name": "DOCKER_ENABLE_CI", "value": "true"}]'

    # Restart Web App
    - task: AzureCLI@2
      displayName: Restart Web App
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az webapp restart --name $(appServiceName) --resource-group $(resourceGroup)
          echo "Web App restarted successfully."
